<details class='detWorkout' open>
     <summary>Workout<span class='spanDeleteWorkout'></span></summary>
     <table class='tblWorkoutContent'>
        <tr>
            <td><input class='txtWorkoutName' type='text' value='[WORKOUT_NAME]'></input></td>
        </tr>
         <tr>
            <td><input class='txtWorkoutReps' type='number' value=[WORKOUT_VALUE]></input> reps</td>
        </tr>
        <tr>
            <td>
                Actions :
                <table class='tblActionsList'></table>
                <button class='btnAddAction'>Add Action</button>    
            </td>     
        </tr>
    </table>
</details>
